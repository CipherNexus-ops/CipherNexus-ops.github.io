<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Amal Chand | Cyber Security Professional</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="ambient-overlay"></div>
    <div class="shape-tag" id="shapeTag">🌀 LOADING...</div>

    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-dragon"></i> AMAL<span style="color:#f0f;">CHAND</span>
            </div>
            <nav>
                <ul>
                    <li><a href="#home">#HOME</a></li>
                    <li><a href="#skills">#SKILLS</a></li>
                    <li><a href="#projects">#PROJECTS</a></li>
                    <li><a href="#inquiry">#INQUIRY</a></li>
                    <li><a href="#about">#MANIFEST</a></li>
                </ul>
            </nav>
        </header>

        <section id="home" class="hero">
            <div class="hero-content">
                <div class="hero-badge"><i class="fas fa-shield-haltered"></i> <span id="heroBadge">ETHICAL HACKER / MALWARE RESEARCHER</span></div>
                <h1>Break. <span class="highlight">Protect.</span><br> Repeat.</h1>
                <div class="typewriter" id="typewriter-text">$> loading...</div>
                <div class="btn-group">
                    <button class="neon-btn" id="contactBtn"><i class="fas fa-terminal"></i> ENCRYPTED CONTACT</button>
                    <button class="neon-btn" id="resumeBtn"><i class="fas fa-download"></i> DOWNLOAD RESUME</button>
                </div>
                <div class="social-links" id="socialLinks">
                    <!-- Populated by JS -->
                </div>
            </div>
            <div style="flex:0.4; min-width: 180px; text-align:center;" class="glass-panel" style="padding:20px;">
                <i class="fas fa-code" style="font-size: 130px; color: #0ff; filter: drop-shadow(0 0 12px cyan);"></i>
                <p style="margin-top: 12px;">[ PYTHON · BASH · NET ]</p>
            </div>
        </section>

        <section id="skills">
            <h2 class="section-title"><i class="fas fa-microchip"></i> Core Arsenal</h2>
            <div class="skills-grid" id="skillsGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <section id="projects">
            <h2 class="section-title"><i class="fab fa-github"></i> Active Projects</h2>
            <div class="projects-grid" id="projectsGrid">
                <!-- Populated by JS -->
            </div>
        </section>

        <!-- WORKING INQUIRY FORM -->
        <section id="inquiry" class="form-section">
            <h2 class="section-title"><i class="fas fa-envelope"></i> Secure Inquiry</h2>
            <div class="glass-panel inquiry-form">
                <form id="contactForm" action="https://formspree.io/f/xkoyjqwv" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Full Name *</label>
                            <input type="text" name="name" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Email Address *</label>
                            <input type="email" name="email" required placeholder="client@example.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-phone"></i> Phone (Optional)</label>
                            <input type="tel" name="phone" placeholder="+91 12345 67890">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-dollar-sign"></i> Budget Range</label>
                            <select name="budget">
                                <option value="">Select range</option>
                                <option>$500 - $1,000</option>
                                <option>$1,000 - $3,000</option>
                                <option>$3,000 - $5,000</option>
                                <option>$5,000+</option>
                                <option>Negotiable / Hourly</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tasks"></i> Project Type</label>
                        <select name="project_type">
                            <option value="Penetration Testing">Penetration Testing</option>
                            <option value="Malware Analysis">Malware Analysis Research</option>
                            <option value="Network Security">Network Security Assessment</option>
                            <option value="Custom Tool Development">Custom Security Tool Dev</option>
                            <option value="Consultation">Consultation / Training</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-file-alt"></i> Project Details *</label>
                        <textarea name="message" required placeholder="Describe your security needs, timeline, or specific requirements..."></textarea>
                    </div>
                    <input type="hidden" name="_subject" value="🔐 New Cyber Security Inquiry from Portfolio">
                    <input type="hidden" name="_next" value="https://formspree.io/thank-you">
                    <button type="submit" class="neon-btn submit-btn"><i class="fas fa-paper-plane"></i> Send Encrypted Inquiry</button>
                </form>
            </div>
        </section>

        <section id="about">
            <div class="glass-panel" style="padding: 40px;">
                <h2 style="color: #0ff; margin-bottom: 20px;"><i class="fas fa-user-secret"></i> // CYBER MANIFESTO</h2>
                <div class="about-text" id="aboutText"></div>
                <div class="info-grid" id="infoGrid"></div>
                <div style="font-family: monospace; border-left: 2px solid cyan; padding-left: 18px; margin-top: 20px;" id="quoteBox"></div>
            </div>
        </section>
        
        <footer>
            <p id="footerText"></p>
            <div class="social-links" id="footerSocial">
                <!-- Populated by JS -->
            </div>
        </footer>
    </div>

    <!-- Main JS -->
    <script type="module" src="script.js"></script>
    <script nomodule src="fallback.js"></script>
</body>
</html>
